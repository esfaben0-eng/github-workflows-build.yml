name: Flutter Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: 'appsfolder/livebridge'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.7'

      - name: Patch for Android 15
        run: |
          # Set SDK to Android 15 (API 35)
          if [ -f android/app/build.gradle ]; then
            sed -i 's/compileSdk .*/compileSdk 35/g' android/app/build.gradle
            sed -i 's/targetSdk .*/targetSdk 35/g' android/app/build.gradle
          fi
          # Fix transitions for Android 15 stability
          if [ -f lib/main.dart ]; then
            sed -i 's/PredictiveBackPageTransitionsBuilder()/ZoomPageTransitionsBuilder()/g' lib/main.dart
          fi

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: livebridge-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
