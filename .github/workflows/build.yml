name: Flutter Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: 'appsfolder/livebridge'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
      - name: Patch Files
        run: |
          # Fix Android SDK versions
          if [ -f android/app/build.gradle ]; then
            sed -i 's/compileSdk 36/compileSdk 35/g' android/app/build.gradle
            sed -i 's/targetSdk 36/targetSdk 35/g' android/app/build.gradle
          fi
          # Fix Page Transitions
          if [ -f lib/main.dart ]; then
            sed -i 's/PredictiveBackPageTransitionsBuilder()/ZoomPageTransitionsBuilder()/g' lib/main.dart
          fi
          # Carefully fix Dart SDK version without breaking other lines
          if [ -f pubspec.yaml ]; then
            sed -i 's/sdk: .*/sdk: ">=3.0.0 <4.0.0"/g' pubspec.yaml
          fi
      - run: flutter pub get
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: livebridge-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
