name: Flutter Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          repository: 'appsfolder/livebridge'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
      - name: Patch for Android 15
        run: |
          sed -i 's/compileSdk 36/compileSdk 35/g' android/app/build.gradle
          sed -i 's/targetSdk 36/targetSdk 35/g' android/app/build.gradle
          sed -i 's/PredictiveBackPageTransitionsBuilder()/ZoomPageTransitionsBuilder()/g' lib/main.dart
      - run: flutter pub get
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v3
        with:
          name: livebridge-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

